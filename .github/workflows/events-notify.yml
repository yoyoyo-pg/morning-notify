name: Events Notify

on:
  schedule:
    - cron: '0 21 * * 1,4'  # 月・木 6:00 JST (UTC 21:00)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run events notify
        run: python src/eventkun/main.py
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_EVENTS: ${{ secrets.DISCORD_WEBHOOK_URL_EVENTS }}
          PYTHONPATH: src/reminkun
